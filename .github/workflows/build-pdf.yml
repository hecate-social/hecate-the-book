name: Build PDF

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'metadata.yaml'
      - 'scripts/build-pdf.sh'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'metadata.yaml'
      - 'scripts/build-pdf.sh'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc and texlive
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pandoc \
            texlive-xetex \
            texlive-fonts-extra \
            texlive-latex-extra \
            librsvg2-bin

      - name: Build PDF
        run: ./scripts/build-pdf.sh

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-autonomous-stack
          path: out/the-autonomous-stack.pdf

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: out/the-autonomous-stack.pdf
