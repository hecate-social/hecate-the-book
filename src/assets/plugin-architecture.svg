<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="pa" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#53d8fb"/>
    </marker>
    <marker id="pb" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0c674"/>
    </marker>
    <marker id="pc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="18" font-weight="bold">Plugin Architecture</text>

  <!-- === HECATE DAEMON (center) === -->
  <rect x="220" y="45" width="360" height="185" rx="8" fill="#16213e" stroke="#53d8fb" stroke-width="2"/>
  <text x="400" y="68" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="14" font-weight="bold">Hecate Daemon</text>

  <!-- Built-in apps grid -->
  <text x="245" y="90" fill="#888" font-family="monospace" font-size="9">Built-in Apps:</text>

  <rect x="245" y="98" width="95" height="22" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="292" y="113" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="8">serve_llm</text>

  <rect x="348" y="98" width="110" height="22" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="403" y="113" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="8">guide_settings</text>

  <rect x="466" y="98" width="100" height="22" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="516" y="113" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="8">guide_plugins</text>

  <rect x="245" y="126" width="95" height="22" rx="3" fill="#0f3460" stroke="#53d8fb" stroke-width="1"/>
  <text x="292" y="141" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="8">query_llm</text>

  <rect x="348" y="126" width="110" height="22" rx="3" fill="#0f3460" stroke="#53d8fb" stroke-width="1"/>
  <text x="403" y="141" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="8">query_settings</text>

  <rect x="466" y="126" width="100" height="22" rx="3" fill="#0f3460" stroke="#53d8fb" stroke-width="1"/>
  <text x="516" y="141" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="8">query_plugins</text>

  <!-- Cowboy -->
  <rect x="245" y="158" width="320" height="30" rx="4" fill="#e94560" fill-opacity="0.12" stroke="#e94560" stroke-width="1.5"/>
  <text x="405" y="178" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="11">Cowboy HTTP (routes + dispatch)</text>

  <!-- ReckonDB -->
  <rect x="245" y="195" width="155" height="25" rx="3" fill="#0f3460" stroke="#888" stroke-width="1"/>
  <text x="322" y="212" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">ReckonDB (Event Store)</text>

  <!-- ETS -->
  <rect x="410" y="195" width="155" height="25" rx="3" fill="#0f3460" stroke="#888" stroke-width="1"/>
  <text x="487" y="212" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">ETS (Read Models)</text>

  <!-- === PLUGIN LOADING FLOW (left side) === -->
  <rect x="15" y="260" width="370" height="225" rx="6" fill="#16213e" stroke="#f0c674" stroke-width="1.5"/>
  <text x="200" y="282" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="13" font-weight="bold">Plugin Loading (11 steps)</text>

  <!-- manifest.json source -->
  <rect x="30" y="295" width="140" height="50" rx="4" fill="#0f3460" stroke="#f0c674" stroke-width="1.5"/>
  <text x="100" y="315" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">manifest.json</text>
  <text x="100" y="332" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">name, version,</text>
  <text x="100" y="342" text-anchor="middle" fill="#888" font-family="monospace" font-size="8">routes, deps</text>

  <line x1="170" y1="320" x2="195" y2="320" stroke="#f0c674" stroke-width="1.5" marker-end="url(#pb)"/>

  <!-- Loader steps -->
  <rect x="200" y="295" width="170" height="180" rx="4" fill="#0f3460" stroke="#53d8fb" stroke-width="1"/>
  <text x="285" y="312" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="10" font-weight="bold">hecate_plugin_loader</text>

  <text x="215" y="332" fill="#888" font-family="monospace" font-size="8">1. validate manifest</text>
  <text x="215" y="346" fill="#888" font-family="monospace" font-size="8">2. check dependencies</text>
  <text x="215" y="360" fill="#888" font-family="monospace" font-size="8">3. load BEAM modules</text>
  <text x="215" y="374" fill="#888" font-family="monospace" font-size="8">4. create reckon-db</text>
  <text x="215" y="388" fill="#888" font-family="monospace" font-size="8">5. init ETS tables</text>
  <text x="215" y="402" fill="#888" font-family="monospace" font-size="8">6. mount API routes</text>
  <text x="215" y="416" fill="#888" font-family="monospace" font-size="8">7. mount UI routes</text>
  <text x="215" y="430" fill="#888" font-family="monospace" font-size="8">8. hot-swap dispatch</text>
  <text x="215" y="444" fill="#888" font-family="monospace" font-size="8">9. start supervision</text>
  <text x="215" y="458" fill="#888" font-family="monospace" font-size="8">10. emit plugin_loaded</text>
  <text x="215" y="472" fill="#888" font-family="monospace" font-size="8">11. register with daemon</text>

  <!-- === PLUGIN STRUCTURE (right side) === -->
  <rect x="410" y="260" width="375" height="130" rx="6" fill="#16213e" stroke="#53d8fb" stroke-width="1.5"/>
  <text x="597" y="282" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="13" font-weight="bold">Plugin Structure</text>

  <!-- File tree -->
  <text x="425" y="302" fill="#f0c674" font-family="monospace" font-size="10">hecate-app-{name}/</text>
  <text x="440" y="318" fill="#888" font-family="monospace" font-size="10">ebin/          BEAM bytecode</text>
  <text x="440" y="334" fill="#888" font-family="monospace" font-size="10">priv/static/   UI assets</text>
  <text x="440" y="350" fill="#888" font-family="monospace" font-size="10">reckon-db/     event store</text>
  <text x="440" y="366" fill="#888" font-family="monospace" font-size="10">manifest.json  metadata</text>
  <text x="440" y="382" fill="#888" font-family="monospace" font-size="10">config/        plugin config</text>

  <!-- === ROUTE MOUNTING === -->
  <rect x="410" y="400" width="375" height="85" rx="6" fill="#16213e" stroke="#e94560" stroke-width="1.5"/>
  <text x="597" y="420" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12" font-weight="bold">Route Mounting</text>

  <text x="425" y="440" fill="#53d8fb" font-family="monospace" font-size="10">/plugin/{name}/api/...</text>
  <text x="640" y="440" fill="#888" font-family="monospace" font-size="9">REST API</text>

  <text x="425" y="458" fill="#53d8fb" font-family="monospace" font-size="10">/plugin/{name}/ui/...</text>
  <text x="640" y="458" fill="#888" font-family="monospace" font-size="9">Static UI</text>

  <text x="425" y="476" fill="#53d8fb" font-family="monospace" font-size="10">/plugin/{name}/ws</text>
  <text x="640" y="476" fill="#888" font-family="monospace" font-size="9">WebSocket</text>

  <!-- Arrow from loader to Cowboy -->
  <polyline points="370,320 390,320 390,178 580,178" fill="none" stroke="#e94560" stroke-width="1.5" stroke-dasharray="4" marker-end="url(#pc)"/>
  <text x="490" y="195" fill="#e94560" font-family="monospace" font-size="8">hot-swap dispatch</text>

  <!-- Footer -->
  <text x="400" y="495" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">The Autonomous Stack — Plugin System</text>
</svg>