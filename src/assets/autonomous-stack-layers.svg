  <rect x="510" y="447" width="65" height="25" rx="3" fill="#0f3460" stroke="#53d8fb" stroke-width="1"/>
  <text x="542" y="464" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="9">NAT</text>

  <!-- Right-side label -->
  <rect x="610" y="422" width="175" height="52" rx="4" fill="#16213e" stroke="#0f3460" stroke-width="1" stroke-dasharray="3"/>
  <text x="697" y="441" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="9">Macula Mesh</text>
  <text x="697" y="455" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="9">P2P networking</text>
  <text x="697" y="469" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="9">No central server</text>

