  <rect x="220" y="95" width="100" height="28" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="270" y="113" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">Hecate Web</text>

