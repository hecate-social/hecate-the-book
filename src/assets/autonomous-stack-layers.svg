    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0c674" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f0c674" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#53d8fb" stop-opacity="0.2"/>
