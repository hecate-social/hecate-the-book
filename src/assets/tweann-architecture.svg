<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="ta" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#53d8fb"/>
    </marker>
    <marker id="tb" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0c674"/>
    </marker>
    <marker id="tc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="18" font-weight="bold">TWEANN Architecture</text>
  <text x="400" y="46" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Topology and Weight Evolving Artificial Neural Networks</text>

  <!-- === POPULATION MONITOR === -->
  <rect x="250" y="58" width="300" height="30" rx="4" fill="#e94560" fill-opacity="0.15" stroke="#e94560" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12" font-weight="bold">Population Monitor</text>
  <text x="400" y="78" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12" font-weight="bold">Population Monitor</text>

  <!-- Arrow down -->
  <line x1="400" y1="88" x2="400" y2="108" stroke="#e94560" stroke-width="1.5" marker-end="url(#tc)"/>
  <text x="430" y="102" fill="#888" font-family="monospace" font-size="8">orchestrates</text>

  <!-- === GENOTYPE LAYER === -->
  <rect x="60" y="112" width="520" height="120" rx="6" fill="#16213e" stroke="#f0c674" stroke-width="2"/>
  <text x="80" y="132" fill="#f0c674" font-family="monospace" font-size="13" font-weight="bold">GENOTYPE (ETS Records)</text>
  <text x="80" y="148" fill="#888" font-family="monospace" font-size="9">Static data structure — the blueprint</text>

  <!-- Genotype records -->
  <rect x="80" y="158" width="100" height="30" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="130" y="177" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">#sensor</text>

  <rect x="195" y="158" width="100" height="30" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="245" y="177" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">#neuron</text>

  <rect x="310" y="158" width="100" height="30" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="360" y="177" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">#actuator</text>

  <rect x="425" y="158" width="100" height="30" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1"/>
  <text x="475" y="177" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">#cortex</text>

  <!-- Record details -->
  <text x="130" y="205" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">id, cx_id,</text>
  <text x="130" y="215" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">scape, vl</text>

  <text x="245" y="205" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">id, cx_id,</text>
  <text x="245" y="215" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">af, weights</text>

  <text x="360" y="205" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">id, cx_id,</text>
  <text x="360" y="215" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">scape, vl</text>

  <text x="475" y="205" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">id, s_ids,</text>
  <text x="475" y="215" text-anchor="middle" fill="#888" font-family="monospace" font-size="7">n_ids, a_ids</text>

  <!-- === CONSTRUCTOR ARROW === -->
  <rect x="300" y="242" width="200" height="28" rx="14" fill="#53d8fb" fill-opacity="0.15" stroke="#53d8fb" stroke-width="2"/>
  <text x="400" y="261" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="11" font-weight="bold">constructor.erl</text>

  <line x1="400" y1="232" x2="400" y2="240" stroke="#53d8fb" stroke-width="1.5"/>
  <line x1="400" y1="270" x2="400" y2="285" stroke="#53d8fb" stroke-width="2" marker-end="url(#ta)"/>
  <text x="415" y="282" fill="#888" font-family="monospace" font-size="8">spawns</text>

  <!-- === PHENOTYPE LAYER === -->
  <rect x="60" y="290" width="520" height="120" rx="6" fill="#16213e" stroke="#53d8fb" stroke-width="2"/>
  <text x="80" y="310" fill="#53d8fb" font-family="monospace" font-size="13" font-weight="bold">PHENOTYPE (Running Processes)</text>
  <text x="80" y="326" fill="#888" font-family="monospace" font-size="9">Live OTP processes — the living network</text>

  <!-- Phenotype processes -->
  <circle cx="120" cy="365" r="22" fill="#0f3460" stroke="#53d8fb" stroke-width="2"/>
  <text x="120" y="361" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="8">Sensor</text>
  <text x="120" y="373" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="7">PIDs</text>

  <!-- Neuron layer -->
  <circle cx="235" cy="345" r="16" fill="#0f3460" stroke="#f0c674" stroke-width="1.5"/>
  <text x="235" y="349" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="7">N1</text>

  <circle cx="275" cy="375" r="16" fill="#0f3460" stroke="#f0c674" stroke-width="1.5"/>
  <text x="275" y="379" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="7">N2</text>

  <circle cx="320" cy="350" r="16" fill="#0f3460" stroke="#f0c674" stroke-width="1.5"/>
  <text x="320" y="354" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="7">N3</text>

  <circle cx="355" cy="380" r="16" fill="#0f3460" stroke="#f0c674" stroke-width="1.5"/>
  <text x="355" y="384" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="7">N4</text>

  <text x="290" y="325" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="8">Neuron PIDs</text>

  <!-- Connections sensor -> neurons -->
  <line x1="142" y1="358" x2="219" y2="348" stroke="#53d8fb" stroke-width="1" opacity="0.6"/>
  <line x1="142" y1="372" x2="259" y2="375" stroke="#53d8fb" stroke-width="1" opacity="0.6"/>

  <!-- Connections between neurons -->
  <line x1="251" y1="345" x2="304" y2="350" stroke="#f0c674" stroke-width="1" opacity="0.5"/>
  <line x1="291" y1="375" x2="339" y2="380" stroke="#f0c674" stroke-width="1" opacity="0.5"/>
  <line x1="251" y1="355" x2="259" y2="370" stroke="#f0c674" stroke-width="1" opacity="0.5"/>
  <line x1="336" y1="353" x2="342" y2="372" stroke="#f0c674" stroke-width="1" opacity="0.5"/>

  <!-- Actuator -->
  <circle cx="430" cy="365" r="22" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <text x="430" y="361" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="8">Actuator</text>
  <text x="430" y="373" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="7">PIDs</text>

  <!-- Connections neurons -> actuator -->
  <line x1="336" y1="355" x2="408" y2="362" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  <line x1="371" y1="380" x2="408" y2="372" stroke="#e94560" stroke-width="1" opacity="0.6"/>

  <!-- Cortex -->
  <circle cx="510" cy="365" r="22" fill="#0f3460" stroke="#53d8fb" stroke-width="2"/>
  <text x="510" y="361" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="8">Cortex</text>
  <text x="510" y="373" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="7">PID</text>

  <line x1="452" y1="365" x2="488" y2="365" stroke="#53d8fb" stroke-width="1" opacity="0.6"/>

  <!-- === MUTATION OPERATORS (Side) === -->
  <rect x="610" y="112" width="175" height="298" rx="6" fill="#e94560" fill-opacity="0.08" stroke="#e94560" stroke-width="1.5"/>
  <text x="697" y="135" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12" font-weight="bold">Mutation</text>
  <text x="697" y="150" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="12" font-weight="bold">Operators</text>

  <!-- Mutation list -->
  <rect x="625" y="165" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="181" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">add_neuron</text>

  <rect x="625" y="198" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="214" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">add_link</text>

  <rect x="625" y="231" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="247" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">remove_link</text>

  <rect x="625" y="264" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="280" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">mutate_weights</text>

  <rect x="625" y="297" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="313" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">mutate_af</text>

  <rect x="625" y="330" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="346" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">add_sensor</text>

  <rect x="625" y="363" width="145" height="24" rx="3" fill="#0f3460" stroke="#e94560" stroke-width="1"/>
  <text x="697" y="379" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">add_actuator</text>

  <!-- Feedback arrow from mutations to genotype -->
  <polyline points="610,200 595,200 595,175 580,175" fill="none" stroke="#e94560" stroke-width="1.5" marker-end="url(#tc)"/>
  <text x="595" y="148" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="8">modify</text>

  <!-- === FITNESS / EVALUATION LOOP === -->
  <rect x="60" y="430" width="520" height="35" rx="4" fill="#0f3460" stroke="#888" stroke-width="1"/>
  <text x="320" y="452" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Evaluate fitness --> Select --> Mutate --> Repeat</text>

  <line x1="400" y1="410" x2="400" y2="428" stroke="#888" stroke-width="1" marker-end="url(#ta)" stroke-dasharray="4"/>

  <!-- Footer -->
  <text x="400" y="488" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">The Autonomous Stack — Neuroevolution Engine</text>
</svg>