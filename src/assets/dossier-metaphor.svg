<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <marker id="a1" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#53d8fb"/>
    </marker>
    <marker id="a2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f0c674"/>
    </marker>
  </defs>

  <rect width="800" height="500" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="18" font-weight="bold">The Dossier Metaphor</text>
  <text x="400" y="48" text-anchor="middle" fill="#888" font-family="monospace" font-size="11">An aggregate is a folder of event slips passing through desks</text>

  <!-- === DESK 1: place_order === -->
  <rect x="30" y="90" width="180" height="160" rx="6" fill="#16213e" stroke="#f0c674" stroke-width="2"/>
  <!-- Desk surface -->
  <rect x="40" y="95" width="160" height="25" rx="3" fill="#f0c674" fill-opacity="0.15"/>
  <text x="120" y="113" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="12" font-weight="bold">place_order</text>
  <!-- Desk label -->
  <text x="120" y="138" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Desk 1</text>

  <!-- Dossier at desk 1 -->
  <rect x="55" y="150" width="130" height="85" rx="2" fill="#0f3460" stroke="#53d8fb" stroke-width="1.5"/>
  <text x="120" y="168" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="10">DOSSIER #42</text>
  <!-- Slip 1 -->
  <rect x="65" y="178" width="110" height="22" rx="2" fill="#e94560" fill-opacity="0.2" stroke="#e94560" stroke-width="1"/>
  <text x="120" y="193" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="9">order_placed_v1</text>
  <!-- Slip added indicator -->
  <text x="185" y="193" fill="#f0c674" font-family="monospace" font-size="14" font-weight="bold">+</text>
  <text x="120" y="228" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">slip added here</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="170" x2="258" y2="170" stroke="#53d8fb" stroke-width="2" marker-end="url(#a1)"/>

  <!-- === DESK 2: receive_payment === -->
  <rect x="270" y="90" width="180" height="160" rx="6" fill="#16213e" stroke="#f0c674" stroke-width="2"/>
  <rect x="280" y="95" width="160" height="25" rx="3" fill="#f0c674" fill-opacity="0.15"/>
  <text x="360" y="113" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="12" font-weight="bold">receive_payment</text>
  <text x="360" y="138" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Desk 2</text>

  <!-- Dossier at desk 2 -->
  <rect x="295" y="150" width="130" height="85" rx="2" fill="#0f3460" stroke="#53d8fb" stroke-width="1.5"/>
  <text x="360" y="168" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="10">DOSSIER #42</text>
  <!-- Slip 1 (carried) -->
  <rect x="305" y="175" width="110" height="18" rx="2" fill="#e94560" fill-opacity="0.1" stroke="#e94560" stroke-width="0.5"/>
  <text x="360" y="188" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="8" opacity="0.6">order_placed_v1</text>
  <!-- Slip 2 (new) -->
  <rect x="305" y="196" width="110" height="18" rx="2" fill="#e94560" fill-opacity="0.2" stroke="#e94560" stroke-width="1"/>
  <text x="360" y="209" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="8">payment_received_v1</text>
  <text x="425" y="209" fill="#f0c674" font-family="monospace" font-size="14" font-weight="bold">+</text>

  <!-- Arrow 2→3 -->
  <line x1="450" y1="170" x2="498" y2="170" stroke="#53d8fb" stroke-width="2" marker-end="url(#a1)"/>

  <!-- === DESK 3: ship_order === -->
  <rect x="510" y="90" width="180" height="160" rx="6" fill="#16213e" stroke="#f0c674" stroke-width="2"/>
  <rect x="520" y="95" width="160" height="25" rx="3" fill="#f0c674" fill-opacity="0.15"/>
  <text x="600" y="113" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="12" font-weight="bold">ship_order</text>
  <text x="600" y="138" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Desk 3</text>

  <!-- Dossier at desk 3 -->
  <rect x="535" y="150" width="130" height="85" rx="2" fill="#0f3460" stroke="#53d8fb" stroke-width="1.5"/>
  <text x="600" y="168" text-anchor="middle" fill="#53d8fb" font-family="monospace" font-size="10">DOSSIER #42</text>
  <!-- 3 slips -->
  <rect x="545" y="175" width="110" height="14" rx="2" fill="#e94560" fill-opacity="0.1" stroke="#e94560" stroke-width="0.5"/>
  <text x="600" y="185" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="7" opacity="0.5">order_placed_v1</text>
  <rect x="545" y="191" width="110" height="14" rx="2" fill="#e94560" fill-opacity="0.1" stroke="#e94560" stroke-width="0.5"/>
  <text x="600" y="201" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="7" opacity="0.5">payment_received_v1</text>
  <rect x="545" y="207" width="110" height="14" rx="2" fill="#e94560" fill-opacity="0.2" stroke="#e94560" stroke-width="1"/>
  <text x="600" y="217" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="7">order_shipped_v1</text>
  <text x="665" y="217" fill="#f0c674" font-family="monospace" font-size="12" font-weight="bold">+</text>

  <!-- Arrow to Filing Cabinet -->
  <polyline points="690,170 730,170 730,310" fill="none" stroke="#53d8fb" stroke-width="2" marker-end="url(#a1)"/>

  <!-- === FILING CABINET (Event Store) === -->
  <rect x="620" y="320" width="160" height="120" rx="4" fill="#0f3460" stroke="#e94560" stroke-width="2"/>
  <!-- Drawer lines -->
  <line x1="630" y1="355" x2="770" y2="355" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="390" x2="770" y2="390" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="410" x2="770" y2="410" stroke="#e94560" stroke-width="1" opacity="0.5"/>
  <!-- Label -->
  <text x="700" y="340" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="13" font-weight="bold">Event Store</text>
  <text x="700" y="375" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">order_placed_v1</text>
  <text x="700" y="405" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">payment_received_v1</text>
  <text x="700" y="430" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">order_shipped_v1</text>
  <!-- Handle -->
  <rect x="688" y="345" width="24" height="6" rx="2" fill="#e94560" opacity="0.5"/>

  <!-- Arrow from Filing Cabinet to Projections -->
  <line x1="620" y1="380" x2="500" y2="380" stroke="#f0c674" stroke-width="2" marker-end="url(#a2)"/>

  <!-- === PROJECTIONS (Index Cards) === -->
  <rect x="80" y="310" width="410" height="140" rx="6" fill="#16213e" stroke="#f0c674" stroke-width="1.5"/>
  <text x="285" y="335" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="13" font-weight="bold">Projections (Read Models)</text>
  <text x="285" y="350" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">Index cards built from the filed slips</text>

  <!-- Index cards -->
  <rect x="100" y="365" width="170" height="70" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1" transform="rotate(-2 185 400)"/>
  <text x="185" y="387" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">orders_by_status</text>
  <text x="185" y="403" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">#42: shipped</text>
  <text x="185" y="417" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">#43: placed</text>

  <rect x="300" y="365" width="170" height="70" rx="3" fill="#0f3460" stroke="#f0c674" stroke-width="1" transform="rotate(1 385 400)"/>
  <text x="385" y="387" text-anchor="middle" fill="#f0c674" font-family="monospace" font-size="10">revenue_summary</text>
  <text x="385" y="403" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">total: $2,847</text>
  <text x="385" y="417" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">today: $99</text>

  <!-- Explanation text -->
  <text x="400" y="485" text-anchor="middle" fill="#555" font-family="monospace" font-size="10">The Autonomous Stack — Aggregates as Dossiers</text>
</svg>